name: github-pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.repo-guard.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Check canonical repository
        id: repo-guard
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REPOSITORY}" == "SRC-Assistant/vtbot" || "${GITHUB_REPOSITORY}" == "src-assistant/vtbot" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify static Pages bundle
        shell: bash
        run: |
          set -euo pipefail

          test -f site/index.html
          test -f site/404.html
          test -f site/runtime-config.js

          if grep -RIn 'VITE_APP_ENV:"development"' site; then
            echo "vtbot site still contains development app env." >&2
            exit 1
          fi

          if grep -RInE "https://src-assistant\\.github\\.io/vtb([/?\"']|$)" site; then
            echo "vtbot site must not keep the old /vtb public URL." >&2
            exit 1
          fi

          if grep -n 'vtb.eigensol.com' site/runtime-config.js; then
            echo "vtbot runtime config must not expose the Linux frontend URL." >&2
            exit 1
          fi

          if ! grep -n 'src-assistant.github.io/vtbot' site/runtime-config.js >/dev/null; then
            echo "vtbot runtime config must target https://src-assistant.github.io/vtbot." >&2
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  publish:
    needs: build
    if: needs.build.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  skip-note:
    needs: build
    if: needs.build.outputs.should_publish != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish outside canonical repo
        run: |
          echo "Skipping GitHub Pages publish because this workflow is not running in SRC-Assistant/vtbot."
